<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rain Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Rain Prediction — Will It Rain Tomorrow?</h1>
    {% if error %}
    <div style="background:#ffebee; border:2px solid #f44336; border-radius:8px;
                padding:15px; max-width:700px; margin:10px auto; color:#c62828; text-align:center;">
        <strong>Error:</strong> {{ error }}
    </div>
{% endif %}
    <p style="text-align:center; color:#666; max-width:700px; margin:0 auto 20px;">
        Enter today's weather observations and choose a model. The app uses
        scikit-learn classifiers trained on 10 years of Australian weather data
        to predict whether it will rain tomorrow.
    </p>

    <form action="/predict" method="post" style="max-width:700px; margin:0 auto;">

        <label>Model:</label>
        <select name="model">
            <option value="random_forest">Random Forest</option>
            <option value="logistic_regression">Logistic Regression</option>
        </select>

        <label>Location (for reference):</label>
        <select name="location">
            <option value="ALL">— General —</option>
            {% for loc in locations %}
                <option value="{{ loc }}">{{ loc }}</option>
            {% endfor %}
        </select>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:10px;">
            <div>
                <label>Min Temp (°C):</label>
                <input type="number" step="1" name="MinTemp" value="12.0" required>
            </div>
            <div>
                <label>Max Temp (°C):</label>
                <input type="number" step="1" name="MaxTemp" value="25.0" required>
            </div>
            <div>
                <label>Rainfall (mm):</label>
                <input type="number" step="1" name="Rainfall" value="0.0" required>
            </div>
            <div>
                <label>Wind Gust Speed (km/h):</label>
                <input type="number" step="1" name="WindGustSpeed" value="35.0" required>
            </div>
            <div>
                <label>Wind Speed 9am (km/h):</label>
                <input type="number" step="1" name="WindSpeed9am" value="10.0" required>
            </div>
            <div>
                <label>Wind Speed 3pm (km/h):</label>
                <input type="number" step="1" name="WindSpeed3pm" value="15.0" required>
            </div>
            <div>
                <label>Humidity 9am (%):</label>
                <input type="number" step="1" name="Humidity9am" value="60.0" required>
            </div>
            <div>
                <label>Humidity 3pm (%):</label>
                <input type="number" step="1" name="Humidity3pm" value="40.0" required>
            </div>
            <div>
                <label>Pressure 9am (hPa):</label>
                <input type="number" step="1" name="Pressure9am" value="1012.0" required>
            </div>
            <div>
                <label>Pressure 3pm (hPa):</label>
                <input type="number" step="1" name="Pressure3pm" value="1010.0" required>
            </div>
            <div>
                <label>Cloud 9am (oktas 0-8):</label>
                <input type="number" step="1" name="Cloud9am" value="4.0" required>
            </div>
            <div>
                <label>Cloud 3pm (oktas 0-8):</label>
                <input type="number" step="1" name="Cloud3pm" value="5.0" required>
            </div>
            <div>
                <label>Temp 9am (°C):</label>
                <input type="number" step="1" name="Temp9am" value="15.0" required>
            </div>
            <div>
                <label>Temp 3pm (°C):</label>
                <input type="number" step="1" name="Temp3pm" value="22.0" required>
            </div>
            <div>
                <label>Evaporation (mm):</label>
                <input type="number" step="1" name="Evaporation" value="4.0" required>
            </div>
            <div>
                <label>Sunshine (hours):</label>
                <input type="number" step="0.5" name="Sunshine" value="7.0" required>
            </div>
            <div>
                <label>Rain Today:</label>
                <select name="RainToday">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>
        </div>

        <br>
        <button type="submit">Predict</button>
    </form>

    <br>
    <a href="/">← Back to Home</a>
</body>
</html>
